version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventoryapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile   # Root Dockerfile — builds React + .NET together
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Host=db;Port=5432;Database=inventoryapp;Username=postgres;Password=${POSTGRES_PASSWORD:-devpassword}
      Jwt__Secret: ${JWT_SECRET:-dev-secret-key-at-least-32-chars-long-here}
      Jwt__Issuer: InventoryApp
      Jwt__Audience: InventoryApp
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Auth__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Auth__Facebook__AppId: ${FACEBOOK_APP_ID:-}
      Auth__Facebook__AppSecret: ${FACEBOOK_APP_SECRET:-}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME:-}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY:-}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET:-}
      Frontend__Url: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
