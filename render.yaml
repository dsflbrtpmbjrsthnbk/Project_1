# render.yaml — ONE service, ONE Dockerfile, ONE URL
# Push to GitHub → Render → New Blueprint → done

services:
  - type: web
    name: collectify
    runtime: docker
    # Dockerfile is in the ROOT of the repo
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: collectify-db
          property: connectionString
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: InventoryApp
      - key: Jwt__Audience
        value: InventoryApp
      # Fill these in Render dashboard manually:
      - key: Auth__Google__ClientId
        sync: false
      - key: Auth__Google__ClientSecret
        sync: false
      - key: Auth__Facebook__AppId
        sync: false
      - key: Auth__Facebook__AppSecret
        sync: false
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      # Frontend runs on same URL as backend, so CORS is same-origin
      - key: Frontend__Url
        sync: false

databases:
  - name: collectify-db
    databaseName: inventoryapp
    plan: free
