# render.yaml — ONE service, ONE Dockerfile
# Push to GitHub → Render → New → Blueprint

services:
  - type: web
    name: collectify
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080

      # Render auto-sets DATABASE_URL when you link a database.
      # Our Program.cs parses postgres://... format automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: collectify-db
          property: connectionString

      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: InventoryApp
      - key: Jwt__Audience
        value: InventoryApp

      # Set these manually in Render → Environment tab:
      - key: Auth__Google__ClientId
        sync: false
      - key: Auth__Google__ClientSecret
        sync: false
      - key: Auth__Facebook__AppId
        sync: false
      - key: Auth__Facebook__AppSecret
        sync: false
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false

databases:
  - name: collectify-db
    databaseName: inventoryapp
    plan: free
